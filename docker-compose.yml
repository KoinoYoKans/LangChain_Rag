services:
  api:
    build: .
    env_file: .env
    environment:
      LOCAL_EMBEDDING_MODEL_PATH: /models/embedding
      LOCAL_RERANK_MODEL_PATH: /models/reranker
    command: uvicorn core.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - /Users/fischel/model/Qwen3-Embedding-8B:/models/embedding:ro
      - /Users/fischel/model/Qwen3-Reranker-8B:/models/reranker:ro
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    environment:
      LOCAL_EMBEDDING_MODEL_PATH: /models/embedding
      LOCAL_RERANK_MODEL_PATH: /models/reranker
    command: python worker.py
    volumes:
      - ./storage:/app/storage
      - /Users/fischel/model/Qwen3-Embedding-8B:/models/embedding:ro
      - /Users/fischel/model/Qwen3-Reranker-8B:/models/reranker:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
